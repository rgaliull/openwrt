---
- name: Check if podkop is already installed
  ansible.builtin.raw: |
    if [ "{{ pkg_manager }}" = "apk" ]; then
      apk info -e podkop 2>/dev/null && echo INSTALLED || echo NOT_INSTALLED
    else
      opkg list-installed 2>/dev/null | grep -q "^podkop " && echo INSTALLED || echo NOT_INSTALLED
    fi
  register: podkop_check
  changed_when: false

- name: Drop caches before installing podkop
  ansible.builtin.raw: sync; echo 3 > /proc/sys/vm/drop_caches
  failed_when: false
  changed_when: false

- name: Install podkop dependencies (opkg router — coreutils-base64 and bind-dig)
  ansible.builtin.raw: |
    opkg update 2>/dev/null
    for pkg in coreutils-base64 bind-dig; do
      opkg list-installed 2>/dev/null | grep -q "^$pkg " && echo "$pkg: already installed" || { opkg install "$pkg" 2>/dev/null && echo "$pkg: installed"; }
    done
    echo DEPENDENCIES_OK
  when:
    - podkop_check.stdout_lines[-1] == 'NOT_INSTALLED'
    - pkg_manager != 'apk'

- name: Download podkop ipk (opkg router)
  ansible.builtin.raw: |
    URL="https://github.com/rgaliull/openwrt/raw/refs/heads/main/all/podkop-v0.7.19-r1-all.ipk"
    wget -q --timeout=30 -O /root/podkop.ipk "$URL" && echo DOWNLOADED || echo FAILED
  when:
    - podkop_check.stdout_lines[-1] == 'NOT_INSTALLED'
    - pkg_manager != 'apk'

- name: Install podkop ipk with --nodeps (opkg router)
  ansible.builtin.raw: opkg install --nodeps /root/podkop.ipk && rm -f /root/podkop.ipk && echo INSTALLED || echo FAILED
  when:
    - podkop_check.stdout_lines[-1] == 'NOT_INSTALLED'
    - pkg_manager != 'apk'

- name: Download and install luci-app-podkop (opkg router)
  ansible.builtin.raw: |
    URL="https://github.com/itdoginfo/podkop/releases/download/0.7.19/luci-app-podkop-v0.7.19-r1-all.ipk"
    wget -q --timeout=30 -O /root/luci-podkop.ipk "$URL" || { echo FAILED; exit 0; }
    opkg install --nodeps /root/luci-podkop.ipk && echo INSTALLED || echo FAILED
    rm -f /root/luci-podkop.ipk
  when:
    - podkop_check.stdout_lines[-1] == 'NOT_INSTALLED'
    - pkg_manager != 'apk'

- name: Download and install podkop (apk router)
  ansible.builtin.raw: |
    URL="https://github.com/itdoginfo/podkop/releases/download/0.7.19/podkop-0.7.19-r1.apk"
    wget -q --timeout=30 -O /root/podkop.apk "$URL" || { echo FAILED; exit 1; }
    apk add --allow-untrusted /root/podkop.apk && echo INSTALLED || echo FAILED
    rm -f /root/podkop.apk
  timeout: 120
  when:
    - podkop_check.stdout_lines[-1] == 'NOT_INSTALLED'
    - pkg_manager == 'apk'

- name: Download and install luci-app-podkop (apk router)
  ansible.builtin.raw: |
    URL="https://github.com/itdoginfo/podkop/releases/download/0.7.19/luci-app-podkop-0.7.19-r1.apk"
    wget -q --timeout=30 -O /root/luci-podkop.apk "$URL" || { echo FAILED; exit 0; }
    apk add --allow-untrusted /root/luci-podkop.apk && echo INSTALLED || echo FAILED
    rm -f /root/luci-podkop.apk
  when:
    - podkop_check.stdout_lines[-1] == 'NOT_INSTALLED'
    - pkg_manager == 'apk'

- name: Verify podkop binary exists
  ansible.builtin.raw: test -x /usr/bin/podkop && echo OK || echo MISSING
  register: podkop_bin
  failed_when: "'MISSING' in podkop_bin.stdout"
  changed_when: false

- name: Configure podkop UCI settings section
  ansible.builtin.raw: |
    uci set podkop.settings=podkop
    uci set podkop.settings.dns_type='{{ podkop_settings.dns_type }}'
    uci set podkop.settings.dns_server='{{ podkop_settings.dns_server }}'
    uci set podkop.settings.bootstrap_dns_server='{{ podkop_settings.bootstrap_dns_server }}'
    uci set podkop.settings.dns_rewrite_ttl='{{ podkop_settings.dns_rewrite_ttl }}'
    uci delete podkop.settings.source_network_interfaces 2>/dev/null; true
    {% for iface in podkop_settings.source_network_interfaces %}
    uci add_list podkop.settings.source_network_interfaces='{{ iface }}'
    {% endfor %}
    uci set podkop.settings.enable_output_network_interface='{{ podkop_settings.enable_output_network_interface }}'
    uci set podkop.settings.enable_badwan_interface_monitoring='{{ podkop_settings.enable_badwan_interface_monitoring }}'
    uci set podkop.settings.enable_yacd='{{ podkop_settings.enable_yacd }}'
    uci set podkop.settings.disable_quic='{{ podkop_settings.disable_quic }}'
    uci set podkop.settings.update_interval='{{ podkop_settings.update_interval }}'
    uci set podkop.settings.download_lists_via_proxy='{{ podkop_settings.download_lists_via_proxy }}'
    uci set podkop.settings.dont_touch_dhcp='{{ podkop_settings.dont_touch_dhcp }}'
    uci set podkop.settings.config_path='{{ podkop_settings.config_path }}'
    uci set podkop.settings.cache_path='{{ podkop_settings.cache_path }}'
    uci set podkop.settings.log_level='{{ podkop_settings.log_level }}'
    uci set podkop.settings.exclude_ntp='{{ podkop_settings.exclude_ntp }}'
    uci set podkop.settings.shutdown_correctly='{{ podkop_settings.shutdown_correctly }}'
    uci set podkop.settings.download_lists_via_proxy_section='{{ podkop_settings.download_lists_via_proxy_section }}'
    uci set podkop.settings.enable_yacd_wan_access='{{ podkop_settings.enable_yacd_wan_access }}'
    uci delete podkop.settings.badwan_monitored_interfaces 2>/dev/null; true
    {% for iface in podkop_settings.badwan_monitored_interfaces %}
    uci add_list podkop.settings.badwan_monitored_interfaces='{{ iface }}'
    {% endfor %}
    uci set podkop.settings.badwan_reload_delay='{{ podkop_settings.badwan_reload_delay }}'
    uci commit podkop
  notify: restart podkop

- name: Configure podkop UCI main section
  ansible.builtin.raw: |
    uci set podkop.main=section
    uci set podkop.main.enabled='{{ podkop_section_main.enabled }}'
    uci set podkop.main.connection_type='{{ podkop_section_main.connection_type }}'
    uci set podkop.main.proxy_config_type='{{ podkop_section_main.proxy_config_type }}'
    uci delete podkop.main.community_lists 2>/dev/null; true
    {% for list in podkop_section_main.community_lists %}
    uci add_list podkop.main.community_lists='{{ list }}'
    {% endfor %}
    uci set podkop.main.user_domain_list_type='{{ podkop_section_main.user_domain_list_type }}'
    uci set podkop.main.user_subnet_list_type='{{ podkop_section_main.user_subnet_list_type }}'
    uci set podkop.main.enable_udp_over_tcp='{{ podkop_section_main.enable_udp_over_tcp }}'
    uci set podkop.main.mixed_proxy_enabled='{{ podkop_section_main.mixed_proxy_enabled }}'
    uci set podkop.main.resolve_real_ip_for_routing='{{ podkop_section_main.resolve_real_ip_for_routing }}'
    uci set podkop.main.user_domains_text='{{ podkop_section_main.user_domains_text | trim }}'
    uci set podkop.main.user_subnets_text='{{ podkop_section_main.user_subnets_text }}'
    uci commit podkop
  notify: restart podkop

- name: Render outbound JSON from vless link
  ansible.builtin.set_fact:
    podkop_outbound_json: "{{ vless_link | vless_to_outbound }}"

- name: Configure podkop outbound JSON
  ansible.builtin.raw: |
    uci set podkop.main.outbound_json='{{ podkop_outbound_json | trim }}'
    uci commit podkop
  notify: restart podkop

- name: Enable podkop service
  ansible.builtin.raw: /etc/init.d/podkop enable
  changed_when: false

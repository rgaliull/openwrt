---
- name: Install jq (required by xhttp patch)
  ansible.builtin.raw: |
    if [ "{{ pkg_manager }}" = "apk" ]; then
      apk add jq 2>/dev/null
    else
      opkg update && opkg install jq 2>/dev/null
    fi
    echo OK
  changed_when: false
  failed_when: false

- name: Download and apply podkop-xhttp-patch
  ansible.builtin.raw: |
    wget -q -O /tmp/patch.sh https://raw.githubusercontent.com/moix89/podkop-xhttp-patch/main/install.sh && \
    sh /tmp/patch.sh && \
    rm -f /tmp/patch.sh && \
    echo PATCHED || echo FAILED
  timeout: 120

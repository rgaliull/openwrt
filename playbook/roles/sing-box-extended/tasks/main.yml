---
- name: Check if sing-box is installed and working
  ansible.builtin.raw: |
    if sing-box version >/dev/null 2>&1; then
      echo INSTALLED
    else
      echo NOT_INSTALLED
    fi
  register: sbx_check
  changed_when: false

- name: Skip if already installed
  ansible.builtin.debug:
    msg: "sing-box already installed: {{ sbx_check.stdout_lines[-1] }}"
  when: sbx_check.stdout_lines[-1] == 'INSTALLED'

- name: Install sing-box-extended (apk router)
  ansible.builtin.raw: echo "1" | sh <(wget -O - {{ sing_box_extended_install_url }})
  timeout: 300
  when:
    - "sbx_check.stdout_lines[-1] == 'NOT_INSTALLED'"
    - pkg_manager == 'apk'

- name: Download and extract sing-box-extended (opkg router — compressed)
  ansible.builtin.raw: |
    TAG="v1.13.12-extended-2.3.2"
    ARCH=$(uname -m)
    . /etc/openwrt_release 2>/dev/null
    case "$DISTRIB_ARCH" in *mipsel*|*mipsle*) ARCH="mipsel";; *mips64el*|*mips64le*) ARCH="mips64el";; esac
    case $ARCH in
      aarch64) SFX="arm64";; armv7*) SFX="armv7";; armv6*) SFX="armv6";;
      x86_64) SFX="amd64";; i386|i686) SFX="386";;
      mips) SFX="mips-softfloat";; mipsel|mipsle) SFX="mipsle-softfloat";;
      mips64) SFX="mips64";; mips64el|mips64le) SFX="mips64le";;
      riscv64) SFX="riscv64";; s390x) SFX="s390x";; *) echo UNSUPPORTED; exit 1;;
    esac
    URL="https://github.com/rgaliull/openwrt/raw/refs/heads/main/aarch64_cortex-a53/sing-box-${TAG#v}-linux-$SFX-compressed.tar.gz"
    echo "Downloading $URL"
    cd /tmp
    wget -q --timeout=120 -O sbx.tar.gz "$URL" || { echo DOWNLOAD_FAILED; exit 1; }
    tar -xzf sbx.tar.gz
    BIN=$(find /tmp -type f -name sing-box 2>/dev/null | head -1)
    [ -n "$BIN" ] && [ -s "$BIN" ] || { echo EXTRACT_FAILED; exit 1; }
    mv -f "$BIN" /usr/bin/sing-box
    chmod +x /usr/bin/sing-box
    rm -f sbx.tar.gz
    echo "OK ${TAG#v}"
  timeout: 300
  when:
    - "sbx_check.stdout_lines[-1] == 'NOT_INSTALLED'"
    - pkg_manager != 'apk'

- name: Register fake sing-box opkg entry (for podkop compatibility)
  ansible.builtin.raw: |
    mkdir -p /usr/lib/opkg/info
    printf '%s\n' 'Package: sing-box' 'Version: 1.13.12-extended-2.3.2' 'Status: install user installed' 'Architecture: aarch64_cortex-a53' > /usr/lib/opkg/info/sing-box.control
    echo "/usr/bin/sing-box" > /usr/lib/opkg/info/sing-box.list
    if ! grep -q "^Package: sing-box$" /usr/lib/opkg/status 2>/dev/null; then
      printf '%s\n' 'Package: sing-box' 'Version: 1.13.12-extended-2.3.2' 'Status: install user installed' 'Architecture: aarch64_cortex-a53' '' >> /usr/lib/opkg/status
    fi
    echo OPKG_FAKED
  when: pkg_manager != 'apk'

- name: Deploy sing-box init.d script (for podkop compatibility)
  ansible.builtin.raw: |
    cat > /etc/init.d/sing-box << 'INITEOF'
    #!/bin/sh /etc/rc.common
    USE_PROCD=1
    START=99
    PROG="/usr/bin/sing-box"
    start_service() {
      config_load "sing-box"
      local enabled config_file working_directory log_stderr
      config_get_bool enabled "main" "enabled" "0"
      [ "$enabled" -eq "1" ] || return 0
      config_get config_file "main" "conffile" "/etc/sing-box/config.json"
      config_get working_directory "main" "workdir" "/usr/share/sing-box"
      config_get_bool log_stderr "main" "log_stderr" "1"
      procd_open_instance
      procd_set_param command "$PROG" run -c "$config_file" -D "$working_directory"
      procd_set_param file "$config_file"
      procd_set_param stderr "$log_stderr"
      procd_set_param limits core="unlimited"
      procd_set_param limits nofile="1000000 1000000"
      procd_set_param respawn
      procd_close_instance
    }
    service_triggers() {
      procd_add_reload_trigger "sing-box"
    }
    INITEOF
    chmod +x /etc/init.d/sing-box
    mkdir -p /etc/sing-box /usr/share/sing-box
    echo INIT_DONE
  when: pkg_manager != 'apk'

- name: Verify sing-box
  ansible.builtin.raw: sing-box version 2>/dev/null | head -1
  register: new_ver
  changed_when: false
  when: "sbx_check.stdout_lines[-1] == 'NOT_INSTALLED'"

- name: Show version
  ansible.builtin.debug:
    msg: "sing-box: {{ new_ver.stdout_lines[0] | default('failed') }}"
  when: "sbx_check.stdout_lines[-1] == 'NOT_INSTALLED'"
